{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>Edit Product</h2>

    <form method="POST" enctype="multipart/form-data">

        <label class="form-label">Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" class="form-control mb-2" required>

        <label class="form-label">Description</label>
        <input type="text" name="description" value="{{ product.description }}" class="form-control mb-2" required>

        <label class="form-label">Price</label>
        <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control mb-2" required>

        <label class="form-label">Stock</label>
        <input type="number" name="stock" value="{{ product.stock }}" class="form-control mb-2" required>

        <label class="form-label">Category</label>
        <select name="category" class="form-control mb-3" required>
            <option value="{{ product.category }}">{{ product.category }} (Current)</option>
            <option>Vegetables</option>
            <option>Fruits</option>
            <option>Dairy Products</option>
            <option>Frozen Non-Veg</option>
            <option>Soft Drinks</option>
            <option>Snacks</option>
            <option>Rice & Pulses</option>
            <option>Cooking Oils</option>
            <option>Personal Care</option>
            <option>Cleaning Supplies</option>
            <option>Chocolates</option>
            <option>Baby Products</option>
        </select>

        <label class="form-label">Product Image (Leave blank to keep current)</label>
        {% if product.image %}
        <div class="mb-2">
            {% if product.image.startswith('http') %}
            <img src="{{ product.image }}" width="150" class="rounded shadow-sm">
            {% else %}
            <img src="{{ url_for('static', filename='images/' + product.image) }}" width="150"
                class="rounded shadow-sm">
            {% endif %}
        </div>
        {% endif %}
        <input type="file" name="image" class="form-control mb-4" accept=".jpg,.jpeg,.png,.webp">

        <button class="btn btn-primary w-100 mb-2">Update Product</button>
        <a href="/admin" class="btn btn-secondary w-100">Cancel</a>

    </form>
</div>

{% endblock %}
