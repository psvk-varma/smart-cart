{% extends "base.html" %}
{% block content %}


<div class="auth-wrapper login-bg">
  <div class="auth-card glass animate-up">
    <!-- Title -->
    <div class="text-center mb-4">
      <div class="display-6 mb-2">🛒</div>
      <h2 class="fw-bold text-white mb-1">Welcome Back</h2>
      <p class="text-secondary small">Login to your SmartCart account</p>
    </div>

    <form method="POST">
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase">
          <i class="fas fa-envelope me-1"></i> Email Address
        </label>
        <input type="email" name="email" placeholder="name@example.com" class="form-control" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase">
          <i class="fas fa-lock me-1"></i> Password
        </label>
        <div class="input-group">
          <input type="password" name="password" id="password" placeholder="••••••••" class="form-control" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()"
            style="border-top-right-radius: var(--radius-md); border-bottom-right-radius: var(--radius-md);">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <!-- CAPTCHA -->
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase">
          <i class="fas fa-robot me-1"></i> Security Check
        </label>
        <div class="d-flex align-items-center gap-3">
          <div class="bg-dark p-2 rounded fw-bold border border-secondary text-white"
            style="min-width: 100px; text-align: center;">
            {{ num1 }} + {{ num2 }} = ?
          </div>
          <input type="number" name="captcha" class="form-control" placeholder="Answer" required>
        </div>
      </div>

      <!-- Remember Me -->
      <div class="form-check mb-4">
        <input type="checkbox" name="remember" class="form-check-input" id="remember">
        <label class="form-check-label small text-secondary" for="remember">
          Keep me logged in
        </label>
      </div>

      <!-- Login Button -->
      <button class="btn btn-primary w-100 py-3 shadow-sm mb-4">
        Sign In <i class="fas fa-sign-in-alt"></i>
      </button>

      <!-- Registration Links -->
      <div class="text-center border-top pt-4">
        <a href="/forgot_password" class="text-decoration-none small d-block mb-2 text-primary fw-medium">
          Forgot your password?
        </a>
        <p class="small text-secondary mb-0">
          New here? <a href="/register" class="fw-bold text-primary">Create an account</a>
        </p>
      </div>
    </form>
  </div>
</div>

<!-- Password Toggle Script -->
<script>
  function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.getElementById("toggleIcon");

    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      toggleIcon.classList.remove("fa-eye");
      toggleIcon.classList.add("fa-eye-slash");
    } else {
      passwordInput.type = "password";
      toggleIcon.classList.remove("fa-eye-slash");
      toggleIcon.classList.add("fa-eye");
    }
  }
</script>

{% endblock %}
